name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Enable auto-merge for release PR
        if: steps.release.outputs.pr != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || github.token }}
          RELEASE_PLEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          pr_number="$(printf '%s' "$RELEASE_PLEASE_PR" | jq -r '.number // empty')"

          if [[ -z "$pr_number" ]]; then
            echo "No release PR number returned by Release Please."
            exit 0
          fi

          gh pr merge --auto --squash "$pr_number"

  publish:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    uses: ./.github/workflows/publish-nuget.yml
    permissions:
      contents: write
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    with:
      release-tag: ${{ needs.release.outputs.tag_name }}
      package-version: ${{ needs.release.outputs.version }}
