name: Publish NuGet

on:
  workflow_call:
    inputs:
      release-tag:
        required: true
        type: string
      package-version:
        required: true
        type: string
      dry-run:
        required: false
        type: boolean
        default: false
    secrets:
      NUGET_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      release-tag:
        description: Git tag to publish from
        required: true
        type: string
      package-version:
        description: NuGet package version
        required: true
        type: string
      dry-run:
        description: Pack without publishing to NuGet
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release-tag }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Vortex.sln

      - name: Build
        run: dotnet build Vortex.sln --configuration Release --no-restore

      - name: Pack abstractions
        run: dotnet pack src/Vortex.Mediator.Abstractions/Vortex.Mediator.Abstractions.csproj --configuration Release --no-build -p:Version=${{ inputs.package-version }} -o artifacts/packages

      - name: Pack runtime
        run: dotnet pack src/Vortex.Mediator/Vortex.Mediator.csproj --configuration Release --no-restore -p:Version=${{ inputs.package-version }} -o artifacts/packages

      - name: Push packages
        if: ${{ !inputs.dry-run }}
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Upload packages to GitHub release
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release-tag }}" artifacts/packages/*.nupkg --clobber

      - name: Upload packages as workflow artifact
        if: ${{ inputs.dry-run }}
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ inputs.package-version }}
          path: artifacts/packages/*.nupkg
