name: Add Contributor

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  add-contributor:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Skip bots
        id: contributor
        env:
          AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          if [[ "$AUTHOR_LOGIN" == *"[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "login=$AUTHOR_LOGIN" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout main
        if: steps.contributor.outputs.skip == 'false'
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Add contributor to CONTRIBUTORS.md
        if: steps.contributor.outputs.skip == 'false'
        id: contributors_file
        env:
          CONTRIBUTOR_LOGIN: ${{ steps.contributor.outputs.login }}
        run: |
          contributor_line="- [@${CONTRIBUTOR_LOGIN}](https://github.com/${CONTRIBUTOR_LOGIN})"
          login_pattern="(^|[^[:alnum:]_-])@${CONTRIBUTOR_LOGIN}([^[:alnum:]_-]|$)"
          url_pattern="https://github.com/${CONTRIBUTOR_LOGIN}(/)?"

          if grep -Eiq "$login_pattern" CONTRIBUTORS.md || grep -Eiq "$url_pattern" CONTRIBUTORS.md; then
            echo "Contributor already listed."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$contributor_line" >> CONTRIBUTORS.md
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create contributor update pull request
        if: steps.contributor.outputs.skip == 'false' && steps.contributors_file.outputs.changed == 'true'
        id: contributor_pr
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "docs: add contributor entry for #${{ github.event.pull_request.number }}"
          title: "docs: add contributor entry for #${{ github.event.pull_request.number }}"
          body: |
            Automatic contributor update after merged pull request #${{ github.event.pull_request.number }}.
          branch: chore/add-contributor-${{ github.event.pull_request.number }}
          base: main
          delete-branch: true

      - name: Enable auto-merge for contributor PR
        if: steps.contributor_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --auto --squash "${{ steps.contributor_pr.outputs.pull-request-number }}"
